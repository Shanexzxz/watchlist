<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Watch List 管理</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,"Helvetica Neue",Helvetica,sans-serif;font-size:13px;line-height:1.5;color:#000;background:#f5f6f7}

.topbar{background:#fff;border-bottom:1px solid #d9d9d9;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100}
.topbar .logo{font-size:18px;font-weight:bold;color:#185FA5;letter-spacing:-0.3px}
.topbar .logo span{font-weight:normal;font-size:13px;color:#888;margin-left:8px}
.topbar .user-area{display:flex;align-items:center;gap:12px;font-size:12px;color:#555}
.topbar .user-avatar{width:28px;height:28px;border-radius:50%;background:#d4380d;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold}

.tab-bar{background:#fff;border-bottom:1px solid #d9d9d9;display:flex;align-items:center;padding:0 24px;overflow-x:auto;flex-shrink:0}
.tab-bar::-webkit-scrollbar{height:0}
.tab-item{padding:12px 18px;font-size:13px;color:#666;cursor:pointer;border:none;background:none;position:relative;white-space:nowrap;transition:color .15s}
.tab-item:hover{color:#185FA5}
.tab-item.active{color:#185FA5;font-weight:600}
.tab-item.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:#185FA5}

.main{max-width:1100px;margin:0 auto;padding:20px 24px 60px}

/* Section */
.section-title{font-size:15px;font-weight:bold;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.section-title .badge{font-size:11px;font-weight:normal;background:#e8e8e8;color:#555;padding:1px 7px;border-radius:3px}

/* Card */
.card{background:#fff;border:1px solid #d9d9d9;border-radius:6px;margin-bottom:12px;overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fafafa;border-bottom:1px solid #eee;cursor:pointer;user-select:none}
.card-header:hover{background:#f0f0f0}
.card-header .card-name{font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px}
.card-header .card-name .arrow{font-size:10px;color:#999;transition:transform .2s}
.card-header .card-name .arrow.collapsed{transform:rotate(-90deg)}
.card-header .card-actions{display:flex;gap:4px}
.card-body{padding:0}
.card-body.collapsed{display:none}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:4px 10px;border:1px solid #d9d9d9;border-radius:4px;background:#fff;color:#333;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn:hover{border-color:#185FA5;color:#185FA5}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#1268b5}
.btn-danger{color:#c00;border-color:#ffa39e}
.btn-danger:hover{background:#fff1f0;border-color:#c00}
.btn-sm{padding:2px 7px;font-size:11px}

/* Stock table */
.stock-table{width:100%;border-collapse:collapse;font-size:12px}
.stock-table th{background:#f5f5f5;font-weight:600;padding:7px 8px;text-align:left;border-bottom:1px solid #d9d9d9;white-space:nowrap}
.stock-table td{padding:6px 8px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.stock-table tr:hover td{background:#f9f9f9}
.stock-table .col-drag{width:30px;text-align:center;cursor:grab;color:#bbb;font-size:14px;user-select:none}
.stock-table .col-drag:active{cursor:grabbing}
.stock-table .col-company{min-width:120px}
.stock-table .col-bbg{min-width:80px}
.stock-table .col-ma,.stock-table .col-moc{width:80px;text-align:right}
.stock-table .col-flag{width:50px;text-align:center}
.stock-table .col-actions{width:70px;text-align:center}

/* Inline editing */
.editable{cursor:text;padding:2px 4px;border-radius:3px;border:1px solid transparent;min-width:40px;display:inline-block}
.editable:hover{border-color:#d9d9d9;background:#fff}
.editable:focus{outline:none;border-color:#185FA5;background:#fff}

/* Flag badges */
.flag-yes{display:inline-block;background:#e6f7e6;color:#389e0d;font-size:11px;padding:0 5px;border-radius:2px;font-weight:600}
.flag-no{display:inline-block;background:#f5f5f5;color:#999;font-size:11px;padding:0 5px;border-radius:2px}

/* Empty state */
.empty-state{text-align:center;padding:30px 20px;color:#aaa}
.empty-state p{font-size:13px;color:#999;margin-bottom:10px}

/* Toast */
.toast{position:fixed;top:60px;right:24px;background:#52c41a;color:#fff;padding:8px 16px;border-radius:4px;font-size:13px;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Confirm dialog */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:900;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:8px;padding:24px;min-width:320px;max-width:400px;box-shadow:0 6px 20px rgba(0,0,0,.15)}
.modal h3{font-size:15px;margin-bottom:10px}
.modal p{font-size:13px;color:#666;margin-bottom:18px}
.modal .modal-actions{display:flex;justify-content:flex-end;gap:8px}

/* Add form */
.add-row{display:flex;gap:6px;padding:10px 14px;background:#fafafa;border-top:1px solid #eee;flex-wrap:wrap;align-items:center}
.add-row input,.add-row select{padding:4px 8px;border:1px solid #d9d9d9;border-radius:4px;font-size:12px;outline:none}
.add-row input:focus,.add-row select:focus{border-color:#185FA5}
.add-row input.w-name{width:140px}
.add-row input.w-bbg{width:90px}
.add-row input.w-num{width:70px}

/* Index card */
.index-list{padding:8px 14px}
.index-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-bottom:1px solid #f0f0f0;font-size:12px;border-radius:4px;transition:background .15s,box-shadow .15s}
.index-item:last-child{border-bottom:none}
.index-item:hover{background:#fafafa}
.index-item .drag-handle{cursor:grab;color:#bbb;font-size:16px;user-select:none;line-height:1;width:18px;text-align:center;flex-shrink:0}
.index-item .drag-handle:active{cursor:grabbing}
.index-item .idx-name{flex:1}
.index-item .idx-bbg{color:#888;font-size:11px}

/* Drag & Drop styles */
.dragging{opacity:.4;background:#e6f7ff !important}
.drag-over-top{box-shadow:0 -2px 0 0 #185FA5}
.drag-over-bottom{box-shadow:0 2px 0 0 #185FA5}
.drag-over-card-top{box-shadow:0 -3px 0 0 #185FA5}
.drag-over-card-bottom{box-shadow:0 3px 0 0 #185FA5}
.drag-placeholder-row{background:#e6f7ff !important}
.drag-placeholder-row td{color:#185FA5 !important;font-style:italic}

/* Industry card drag */
.card[draggable="true"]{position:relative}
.card .card-header .drag-handle-card{cursor:grab;color:#bbb;font-size:16px;user-select:none;line-height:1;margin-right:2px;flex-shrink:0}
.card .card-header .drag-handle-card:active{cursor:grabbing}

/* Export */
.toolbar-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-bottom:4px}
.toolbar-bar .left{display:flex;gap:8px;align-items:center}
.toolbar-bar .right{display:flex;gap:8px}
</style>
</head>

// ========== Data Layer ==========
function loadData() {
  var stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    try { return JSON.parse(stored); } catch(e) {}
  }
  var data = {};
  data['finance'] = JSON.parse(JSON.stringify(SEED_DATA.finance));
  GROUPS.forEach(function(g) {
    if (g.id !== 'finance') {
      data[g.id] = { name: g.name, indices: [], industries: [] };
    }
  });
  return data;
}

function saveData() {

// ========== UI Helpers ==========
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1500);
}

function showModal(title, msg, onConfirm) {
  var c = document.getElementById('modalContainer');
  c.innerHTML = '<div class="modal-overlay" id="modalOverlay"><div class="modal"><h3>' + title + '</h3><p>' + msg + '</p><div class="modal-actions"><button class="btn" id="modalCancel">取消</button><button class="btn btn-danger" id="modalConfirm">确认删除</button></div></div></div>';
  document.getElementById('modalCancel').onclick = function() { c.innerHTML = ''; };
  document.getElementById('modalOverlay').onclick = function(e) { if (e.target === e.currentTarget) c.innerHTML = ''; };
  document.getElementById('modalConfirm').onclick = function() { onConfirm(); c.innerHTML = ''; };
}

// ========== Drag & Drop Helpers ==========
var dragState = null;

function getDragAfterElement(container, y, selector) {
  var elements = Array.from(container.querySelectorAll(selector + ':not(.dragging)'));
  var result = null;
  var offset = Number.NEGATIVE_INFINITY;
  elements.forEach(function(el) {
    var box = el.getBoundingClientRect();
    var mid = box.top + box.height / 2;
    var dist = y - mid;
    if (dist < 0 && dist > offset) {
      offset = dist;
      result = el;
    }
  });
  return result;
}

// ========== Drag & Drop Binding ==========
function bindDragEvents() {
  // --- Index items drag ---
  var indexContainer = document.getElementById('indexDragContainer');
  if (indexContainer) {
    var indexItems = indexContainer.querySelectorAll('.index-item');
    indexItems.forEach(function(item) {
      var handle = item.querySelector('[data-drag-handle="index"]');

      item.addEventListener('dragstart', function(e) {
        if (e.target !== item) return;
        dragState = { type: 'index', idx: parseInt(item.dataset.dragIdx) };
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', '');
      });

      item.addEventListener('dragend', function() {
        item.classList.remove('dragging');
        clearDragClasses();
        dragState = null;
      });

      item.addEventListener('dragover', function(e) {
        e.preventDefault();
        if (!dragState || dragState.type !== 'index') return;
        e.dataTransfer.dropEffect = 'move';
        clearDragClasses();
        var rect = item.getBoundingClientRect();
        var mid = rect.top + rect.height / 2;
        if (e.clientY < mid) {
          item.classList.add('drag-over-top');
        } else {
          item.classList.add('drag-over-bottom');
        }
      });

      item.addEventListener('dragleave', function() {
        item.classList.remove('drag-over-top', 'drag-over-bottom');
      });

      item.addEventListener('drop', function(e) {
        e.preventDefault();
        if (!dragState || dragState.type !== 'index') return;
        var fromIdx = dragState.idx;
        var toIdx = parseInt(item.dataset.dragIdx);
        if (fromIdx === toIdx) return;

        var arr = getGroupData().indices;
        var rect = item.getBoundingClientRect();
        var mid = rect.top + rect.height / 2;
        var insertAfter = e.clientY >= mid;

        // Move the item
        var moved = arr.splice(fromIdx, 1)[0];
        var newToIdx = insertAfter ? toIdx : toIdx;
        if (fromIdx < toIdx) newToIdx = insertAfter ? toIdx : toIdx - 1;
        else newToIdx = insertAfter ? toIdx + 1 : toIdx;
        arr.splice(newToIdx > arr.length ? arr.length : newToIdx, 0, moved);

        clearDragClasses();
        dragState = null;
        saveData();
        renderContent();
      });
    });
  }

  // --- Industry cards drag ---
  var indContainer = document.getElementById('industryDragContainer');
  if (indContainer) {
    var cards = indContainer.querySelectorAll('.card[data-drag-type="industry"]');
    cards.forEach(function(card) {
      var handle = card.querySelector('[data-drag-handle="industry"]');

      card.addEventListener('dragstart', function(e) {
        // Only drag from handle
        if (!e.target.closest('[data-drag-handle="industry"]') && e.target !== card) return;
        dragState = { type: 'industry', idx: parseInt(card.dataset.dragInd) };
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', '');
      });

      card.addEventListener('dragend', function() {
        card.classList.remove('dragging');
        clearDragClasses();
        dragState = null;
      });

      card.addEventListener('dragover', function(e) {
        e.preventDefault();
        if (!dragState || dragState.type !== 'industry') return;
        e.dataTransfer.dropEffect = 'move';
        clearDragClasses();
        var header = card.querySelector('.card-header');
        var rect = header.getBoundingClientRect();
        var mid = rect.top + rect.height / 2;
        if (e.clientY < mid) {
          card.classList.add('drag-over-card-top');
        } else {
          card.classList.add('drag-over-card-bottom');
        }
      });

      card.addEventListener('dragleave', function() {
        card.classList.remove('drag-over-card-top', 'drag-over-card-bottom');
      });

      card.addEventListener('drop', function(e) {
        e.preventDefault();
        if (!dragState || dragState.type !== 'industry') return;
        var fromIdx = dragState.idx;
        var toIdx = parseInt(card.dataset.dragInd);
        if (fromIdx === toIdx) return;

        var arr = getGroupData().industries;
        var header = card.querySelector('.card-header');
        var rect = header.getBoundingClientRect();
        var mid = rect.top + rect.height / 2;
        var insertAfter = e.clientY >= mid;

        var moved = arr.splice(fromIdx, 1)[0];
        var newToIdx;
        if (fromIdx < toIdx) newToIdx = insertAfter ? toIdx : toIdx - 1;
        else newToIdx = insertAfter ? toIdx + 1 : toIdx;
        arr.splice(newToIdx > arr.length ? arr.length : newToIdx, 0, moved);

        clearDragClasses();
        dragState = null;
        saveData();
        renderContent();
      });
    });
  }

  // --- Stock rows drag ---
  (getGroupData().industries || []).forEach(function(ind, i) {
    var tbody = document.getElementById('stkTbody_' + i);
    if (!tbody) return;

    var rows = tbody.querySelectorAll('tr[data-drag-type="stock"]');
    rows.forEach(function(row) {
      row.addEventListener('dragstart', function(e) {
        if (!e.target.closest('[data-drag-handle="stock"]') && e.target !== row) return;
        dragState = { type: 'stock', ind: i, stk: parseInt(row.dataset.dragStk) };
        row.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', '');
      });

      row.addEventListener('dragend', function() {
        row.classList.remove('dragging');
        clearDragClasses();
        dragState = null;
      });

      row.addEventListener('dragover', function(e) {
        e.preventDefault();
        if (!dragState || dragState.type !== 'stock' || dragState.ind !== i) return;
        e.dataTransfer.dropEffect = 'move';
        clearDragClasses();
        var rect = row.getBoundingClientRect();
        var mid = rect.top + rect.height / 2;
        if (e.clientY < mid) {
          row.classList.add('drag-over-top');
        } else {
          row.classList.add('drag-over-bottom');
        }
      });

      row.addEventListener('dragleave', function() {
        row.classList.remove('drag-over-top', 'drag-over-bottom');
      });

      row.addEventListener('drop', function(e) {
        e.preventDefault();
        if (!dragState || dragState.type !== 'stock' || dragState.ind !== i) return;
        var fromStk = dragState.stk;
        var toStk = parseInt(row.dataset.dragStk);
        if (fromStk === toStk) return;

        var arr = getGroupData().industries[i].stocks;
        var rect = row.getBoundingClientRect();
        var mid = rect.top + rect.height / 2;
        var insertAfter = e.clientY >= mid;

        var moved = arr.splice(fromStk, 1)[0];
        var newToIdx;
        if (fromStk < toStk) newToIdx = insertAfter ? toStk : toStk - 1;
        else newToIdx = insertAfter ? toStk + 1 : toStk;
        arr.splice(newToIdx > arr.length ? arr.length : newToIdx, 0, moved);

        clearDragClasses();
        dragState = null;
        saveData();
        renderContent();
      });
    });
  });
}

// ========== Event Binding ==========
function bindEvents() {
  // Toggle sections
  var toggleIdx = document.getElementById('toggleIndices');
  if (toggleIdx) toggleIdx.onclick = function() {
    collapsedSections['indices'] = !collapsedSections['indices'];
    renderContent();
  };
  var toggleInd = document.getElementById('toggleIndustries');
  if (toggleInd) toggleInd.onclick = function() {
    collapsedSections['industries'] = !collapsedSections['industries'];
    renderContent();
  };

  // Card collapse
  document.querySelectorAll('.card-header[data-ind]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      if (e.target.closest('.card-actions') || e.target.closest('.editable') || e.target.closest('.drag-handle-card')) return;
      var ind = parseInt(el.dataset.ind);
      collapsedSections['ind_' + ind] = !collapsedSections['ind_' + ind];
      renderContent();
    });
  });

  // Add index
  var addIdxBtn = document.getElementById('addIndexBtn');
  if (addIdxBtn) addIdxBtn.onclick = function() {
    var name = prompt('指数名称:');
    if (!name) return;
    var bbg = prompt('BBG 代码（可选）:', '') || '';
    getGroupData().indices.push({ name: name, bbg: bbg });
    saveData(); renderContent();
  };

  // Delete index
  document.querySelectorAll('[data-del-idx]').forEach(function(btn) {
    btn.onclick = function() {
      var i = parseInt(btn.dataset.delIdx);
      var name = getGroupData().indices[i].name;
      showModal('删除指数', '确认删除指数 "' + name + '"？', function() {
        getGroupData().indices.splice(i, 1);
        saveData(); renderContent();
      });
    };
  });

  // Add industry
  var addIndBtn = document.getElementById('addIndustryBtn');
  if (addIndBtn) addIndBtn.onclick = function() {
    var name = prompt('行业名称:');
    if (!name) return;
    getGroupData().industries.push({ name: name, stocks: [] });
    saveData(); renderContent();
  };

  // Delete industry
  document.querySelectorAll('[data-del-ind]').forEach(function(btn) {
    btn.onclick = function() {
      var i = parseInt(btn.dataset.delInd);
      var name = getGroupData().industries[i].name;
      var stkCnt = getGroupData().industries[i].stocks.length;
      showModal('删除行业', '确认删除行业 "' + name + '"（含 ' + stkCnt + ' 只标的）？', function() {
        getGroupData().industries.splice(i, 1);
        saveData(); renderContent();
      });
    };
  });

  // Add stock
  document.querySelectorAll('[data-add-stk]').forEach(function(btn) {
    btn.onclick = function() {
      var i = parseInt(btn.dataset.addStk);
      var company = document.getElementById('newStkCompany_' + i).value.trim();
      if (!company) { showToast('请输入公司名'); return; }
      var bbg = document.getElementById('newStkBbg_' + i).value.trim();
      var ma = document.getElementById('newStkMa_' + i).value.trim();
      var moc = document.getElementById('newStkMoc_' + i).value.trim();
      var tpp = document.getElementById('newStkTpp_' + i).value === '1';
      var sim = document.getElementById('newStkSim_' + i).value === '1';
      getGroupData().industries[i].stocks.push({ company: company, bbg: bbg, ma: ma, moc: moc, tpp: tpp, simulated: sim });
      saveData(); renderContent();
    };
  });

  // Delete stock
  document.querySelectorAll('[data-del-stk]').forEach(function(btn) {
    btn.onclick = function() {
      var parts = btn.dataset.delStk.split('_');
      var ind = parseInt(parts[0]);
      var si = parseInt(parts[1]);
      var name = getGroupData().industries[ind].stocks[si].company;
      showModal('删除标的', '确认删除 "' + name + '"？', function() {
        getGroupData().industries[ind].stocks.splice(si, 1);
        saveData(); renderContent();
      });
    };
  });

  // Toggle TPP / Simulated flags
  document.querySelectorAll('[data-toggle]').forEach(function(el) {
    el.onclick = function() {
      var ind = parseInt(el.dataset.ind);
      var si = parseInt(el.dataset.stk);
      var field = el.dataset.toggle;
      getGroupData().industries[ind].stocks[si][field] = !getGroupData().industries[ind].stocks[si][field];
      saveData(); renderContent();
    };
  });

  // Inline editing - blur saves
  document.querySelectorAll('.editable').forEach(function(el) {
    el.setAttribute('contenteditable', 'true');
    el.addEventListener('blur', function() {
      var val = el.textContent.trim();
      if (val === '-') val = '';
      var field = el.dataset.field;

      if (field === 'idx-name') {
        var i = parseInt(el.dataset.idx);
        if (val && getGroupData().indices[i]) { getGroupData().indices[i].name = val; saveData(); }
      } else if (field === 'idx-bbg') {
        var i = parseInt(el.dataset.idx);
        if (getGroupData().indices[i]) { getGroupData().indices[i].bbg = val; saveData(); }
      } else if (field === 'ind-name') {
        var i = parseInt(el.dataset.ind);
        if (val && getGroupData().industries[i]) { getGroupData().industries[i].name = val; saveData(); }
      } else if (field && field.startsWith('stk-')) {
        var ind = parseInt(el.dataset.ind);
        var si = parseInt(el.dataset.stk);
        var stk = getGroupData().industries[ind] && getGroupData().industries[ind].stocks[si];
        if (stk) {
          var key = field.replace('stk-', '');
          if (key === 'company') { if (val) stk.company = val; }
          else { stk[key] = val; }
          saveData();
        }
      }
    });
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    });
  });

  // Reset to default
  var resetBtn = document.getElementById('btnResetSeed');
  if (resetBtn) resetBtn.onclick = function() {
    showModal('重置数据', '确认重置为默认值？当前所有修改将丢失。', function() {
      allData = {};
      allData['finance'] = JSON.parse(JSON.stringify(SEED_DATA.finance));
      GROUPS.forEach(function(g) {
        if (g.id !== 'finance') allData[g.id] = { name: g.name, indices: [], industries: [] };
      });
      saveData(); renderContent();
    });
  };

  // Export Excel
  var exportBtn = document.getElementById('btnExportExcel');
  if (exportBtn) exportBtn.onclick = function() {
    exportToExcel();
  };

  // Import Excel
  var importBtn = document.getElementById('btnImportExcel');
  if (importBtn) importBtn.onclick = function() {
    document.getElementById('fileInput').click();
  };
  var fileInput = document.getElementById('fileInput');
  if (fileInput) fileInput.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    importFromExcel(file);
    e.target.value = '';
  };
}

// ========== Excel Import/Export ==========
function exportToExcel() {
  var gd = getGroupData();
  if (!gd) { showToast('无数据可导出'); return; }

  var rows = [];

  // Indices section
  rows.push(['【指数】']);
  (gd.indices || []).forEach(function(idx) {
    rows.push([idx.name, idx.bbg || '']);
  });
  rows.push([]); // blank row

  // Header row
  rows.push(['BBG代码', '公司名称', 'MA持有价值', 'MoC', 'TPP持仓', '模拟仓']);

  // Industries
  (gd.industries || []).forEach(function(ind) {
    rows.push(['【' + ind.name + '】']);
    (ind.stocks || []).forEach(function(s) {
      rows.push([
        s.bbg || '',
        s.company || '',
        s.ma || '',
        s.moc || '',
        s.tpp ? 'Y' : '',
        s.simulated ? 'Y' : ''
      ]);
    });
    rows.push([]); // blank row between industries
  });

  // Create workbook
  var ws = XLSX.utils.aoa_to_sheet(rows);

  // Set column widths
  ws['!cols'] = [
    { wch: 22 },  // A: BBG代码 / 指数名
    { wch: 26 },  // B: 公司名称 / BBG代码
    { wch: 14 },  // C: MA持有价值
    { wch: 10 },  // D: MoC
    { wch: 10 },  // E: TPP持仓
    { wch: 10 }   // F: 模拟仓
  ];

  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, gd.name || 'Sheet1');
  XLSX.writeFile(wb, (gd.name || 'watchlist') + '.xlsx');
  showToast('已导出 ' + gd.name + '.xlsx');
}

function importFromExcel(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, { type: 'array' });
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

      var gd = getGroupData();
      var newIndices = [];
      var newIndustries = [];
      var currentIndustry = null;
      var pastHeader = false;

      for (var r = 0; r < rows.length; r++) {
        var row = rows[r];
        if (!row || row.length === 0) continue;

        var cellA = String(row[0] || '').trim();

        // Index section: 【指数】
        if (cellA === '【指数】') {
          pastHeader = false;
          continue;
        }

        // If we're in the indices section (before the header row)
        if (!pastHeader && cellA && !cellA.startsWith('【')) {
          // Check if this is the header row
          if (cellA === 'BBG代码' || cellA === 'BBG代码') {
            pastHeader = true;
            continue;
          }
          // It's an index row: [name, bbg]
          newIndices.push({
            name: cellA,
            bbg: String(row[1] || '').trim()
          });
          continue;
        }

        // Industry section: 【行业名】
        if (cellA.startsWith('【') && cellA.endsWith('】')) {
          var indName = cellA.slice(1, -1);
          currentIndustry = { name: indName, stocks: [] };
          newIndustries.push(currentIndustry);
          continue;
        }

        // Stock row (after header)
        if (pastHeader && currentIndustry && cellA) {
          var bbg = cellA;
          var company = String(row[1] || '').trim();
          var ma = String(row[2] || '').trim();
          var moc = String(row[3] || '').trim();
          var tppStr = String(row[4] || '').trim().toUpperCase();
          var simStr = String(row[5] || '').trim().toUpperCase();
          currentIndustry.stocks.push({
            company: company,
            bbg: bbg,
            ma: ma,
            moc: moc,
            tpp: tppStr === 'Y',
            simulated: simStr === 'Y'
          });
        }
      }

      // Update data
      gd.indices = newIndices;
      gd.industries = newIndustries;
      saveData();
      renderContent();
      showToast('导入成功：' + newIndices.length + ' 个指数，' + newIndustries.length + ' 个行业');
    } catch(err) {
      showToast('导入失败：' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ========== Init ==========
renderTabs();
renderContent();
</script>
</body>
</html>
