<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Watch List — PC 端</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,"Helvetica Neue",Helvetica,sans-serif;font-size:12px;line-height:1.5;color:#000;background:#f5f6f7}

.topbar{background:#fff;border-bottom:1px solid #d9d9d9;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100}
.topbar .logo{font-size:18px;font-weight:bold;color:#185FA5;letter-spacing:-0.3px}
.topbar .user-area{display:flex;align-items:center;gap:12px;font-size:12px;color:#555}
.topbar .user-avatar{width:28px;height:28px;border-radius:50%;background:#185FA5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold}
.topbar .user-name{font-weight:600;color:#333}
.topbar .user-perm{font-size:11px;color:#888;background:#f0f0f0;padding:2px 8px;border-radius:3px}

.tab-bar{background:#fff;border-bottom:1px solid #d9d9d9;display:flex;align-items:center;padding:0 24px;overflow-x:auto;flex-shrink:0}
.tab-bar::-webkit-scrollbar{height:0}
.tab-item{padding:12px 18px;font-size:13px;color:#666;cursor:pointer;border:none;background:none;position:relative;white-space:nowrap;transition:color .15s}
.tab-item:hover{color:#185FA5}
.tab-item.active{color:#185FA5;font-weight:600}
.tab-item.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:#185FA5}

.toolbar{background:#fff;padding:10px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #e8e8e8;flex-wrap:wrap}
.toolbar .date-label{font-size:12px;color:#666;margin-left:auto}

.main{max-width:1400px;margin:0 auto;padding:20px 24px 40px}

.page-title{font-size:18px;font-weight:bold;margin-bottom:6px;color:#000}
.page-note{font-size:11px;color:#888;font-style:italic;margin-bottom:14px}
.bullets{margin-bottom:18px;padding-left:0}
.bullets li{list-style:none;margin-bottom:3px;color:#333;line-height:1.5;font-size:12px}
.bullets li::before{content:"\2022 ";color:#333}
.bullets strong{color:#000;font-weight:bold}

table{width:100%;border-collapse:collapse;margin-bottom:0;font-size:11px;table-layout:fixed}
th{background:#e8e8e8;font-weight:bold;padding:6px 4px;text-align:right;vertical-align:bottom;border-bottom:1px solid #000;line-height:1.3;white-space:nowrap}
th:first-child{text-align:left}
td{padding:5px 4px;text-align:right;border-bottom:1px solid #000;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td:first-child{text-align:left;font-weight:500}
tbody tr:nth-child(odd){background:#fff}
tbody tr:nth-child(even){background:#C6D9F1}
.up{color:#006400;font-weight:500}
.down{color:#c00;font-weight:500}
.na{color:#999}
.section-gap{margin-top:18px}
.tpp-mark{color:#B8860B;font-weight:bold;margin-left:2px;font-size:12px}

.footnotes{margin-top:18px;padding-top:10px;border-top:1px solid #ccc;font-size:11px;color:#000;line-height:1.7}
.footnotes .source{margin-bottom:6px}
.footnotes .source strong{font-weight:bold}
.footnotes ol{margin:0;padding-left:18px}
.footnotes ol li{margin-bottom:3px;text-align:left}
.footnotes .tpp{color:#B8860B;font-weight:bold}

.empty-state{text-align:center;padding:60px 20px;color:#aaa}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:13px;color:#999}
.empty-state .empty-sub{font-size:11px;color:#bbb;margin-top:4px}

@media(max-width:1100px){
  .main{padding:16px 16px 32px}
}
</style>
</head>

let activeGroup = 'finance';

function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = GROUPS.map(g =>
    '<div class="tab-item' + (g.id === activeGroup ? ' active' : '') + '" data-id="' + g.id + '">' + g.name + '</div>'
  ).join('');
  bar.querySelectorAll('.tab-item').forEach(el => {
    el.addEventListener('click', () => {
      activeGroup = el.dataset.id;
      renderTabs();
      renderContent();
    });
  });
  const accessibleCount = 1;
  document.getElementById('permBadge').textContent = '可访问 ' + accessibleCount + '/8 组';
}



function buildTableHTML(tableObj, tableKey, colgroup) {
  let html = '<table><colgroup>';
  colgroup.forEach(function(w) { html += '<col style="width:' + w + '">'; });
  html += '</colgroup><thead><tr>';

  tableObj.header.forEach(function(h) {
    html += '<th>' + h + '</th>';
  });
  html += '</tr></thead><tbody>';

  tableObj.rows.forEach(function(row) {
    html += '<tr>';
    row.forEach(function(cell, ci) {
      var cls = '';
      var cellStr = String(cell);
      if (ci === 2 && cellStr.startsWith('+')) cls = 'up';
      else if (ci === 2 && cellStr.startsWith('-') && cellStr.length > 1) cls = 'down';
      else if (cellStr === '-' || cellStr === '') cls = 'na';
      html += '<td' + (cls ? ' class="' + cls + '"' : '') + '>' + cell + '</td>';
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  return html;
}

function renderContent() {
  var main = document.getElementById('mainContent');

  if (activeGroup !== 'finance') {
    var group = GROUPS.find(function(g) { return g.id === activeGroup; });
    main.innerHTML = '<div class="empty-state"><div class="empty-icon">\u{1F4CA}</div><p>' + group.name + ' 数据待接入</p><p class="empty-sub">该组的 Watch List 标的清单和行情数据尚未配置</p></div>';
    return;
  }

  var html = '';
  html += '<h1 class="page-title">' + financeData.title + '</h1>';
  if (financeData.note) html += '<p class="note">' + financeData.note + '</p>';
  html += '<ul class="bullets">';
  financeData.bullets.forEach(function(b) { html += '<li>' + b + '</li>'; });
  html += '</ul>';

  html += buildTableHTML(financeData.indexTable, 'index', financeData.indexColgroup);
  html += '<div class="section-gap"></div>';

  financeData.tables.forEach(function(t) {
    var key = t.name.replace(/[^a-zA-Z0-9]/g, '_');
    html += buildTableHTML(t, key, financeData.industryColgroup);
    html += '<div class="section-gap"></div>';
  });

  html += '<div class="footnotes">';
  html += '<div class="source">' + financeData.footnotes[0] + '</div>';
  html += '<ol>';
  financeData.footnotes.slice(1).forEach(function(f) { html += '<li>' + f + '</li>'; });
  html += '</ol></div>';

  main.innerHTML = html;
}

renderTabs();
renderContent();

var d = new Date();
var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var td = new Date(d);
td.setDate(td.getDate() - 1);
if (td.getDay() === 0) td.setDate(td.getDate() - 2);
if (td.getDay() === 6) td.setDate(td.getDate() - 1);
document.getElementById('dateLabel').textContent =
  months[td.getMonth()] + ' ' + td.getDate() + ', ' + td.getFullYear() + ' (T-1)';
</script>
